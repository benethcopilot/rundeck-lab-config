project.name=Irrigation
project.description=Production irrigation app lifecycle - one long-running grow tracker

# Default node executor: SSH (same pattern as Lab).
service.NodeExecutor.default.provider=jsch-ssh
service.FileCopier.default.provider=jsch-scp

# Same lab key as Lab — one keypair for all managed containers.
project.ssh-authentication=privateKey
project.ssh-key-storage-path=keys/lab/id_rsa
project.ssh-user=lab
# Skip strict host key checking; host.docker.internal resolves to a different IP each boot.
project.jsch-ssh.ssh-strict-host-key-checking=no

# File-based resource source reading resources.xml placed by sync-config.sh.
resources.source.1.type=file
resources.source.1.config.file=/home/rundeck/projects/Irrigation/etc/resources.xml
resources.source.1.config.format=resourcexml
resources.source.1.config.generateFileAutomatically=false
resources.source.1.config.includeServerNode=false
resources.source.1.config.requireFileExists=true
resources.source.1.config.writeable=false
